<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout - All For You</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

<div class="logo">
<h2>All For You 🛍️</h2>
</div>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="wishlist.html">❤️ Wishlist</a>
<a href="cart.html">🛒 Cart</a>
</nav>

</header>


<section class="checkout-page">

<div class="checkout-container">

<h1>Checkout</h1>
<p>Enter your delivery details below.</p>

<form id="checkout-form">

<label>Full Name</label>
<input type="text" placeholder="Your full name" required>

<label>Email</label>
<input type="email" placeholder="Your email" required>

<label>Phone Number</label>
<input type="tel" placeholder="Your phone number" required>

<label>Delivery Address</label>
<input type="text" placeholder="House number and street" required>

<label>City</label>
<input type="text" placeholder="City" required>

<label>Postcode</label>
<input type="text" placeholder="Postcode" required>

<h2 id="checkout-total">Total: £0.00</h2>

<button type="submit" class="place-order-btn">
Place Order
</button>

</form>

</div>

</section>


<footer>
<h3>All For You</h3>
<p>Quality products at affordable prices.</p>
<p>© 2026 All For You. All Rights Reserved.</p>
</footer>


<script src="js/script.js?v=6"></script>

</body>
</html>
